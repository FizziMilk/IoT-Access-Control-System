<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Pending</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
  <div class="container mt-5">
    <h1 class="text-center">Access Pending</h1>
    <div class="alert alert-warning mt-4">
      Your phone number is pending review. Please provide your name so the admin can easily identify you.
    </div>
    <form method="POST" action="{{ url_for('update_name') }}">
      <input type="hidden" name="phone_number" value="{{ phone_number }}">
      <div class="form-group">
        <label for="name">Your Name:</label>
        <input type="text" class="form-control" id="name" name="name" placeholder="Enter your name" required>
      </div>
      <button type="submit" class="btn btn-primary">Submit Name</button>
    </form>
  </div>
</body>
</html>
