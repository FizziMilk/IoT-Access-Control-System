<!DOCTYPE html>
<html>
<head>
    <title>Access Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f5f5f5;
        }
        .container {
            text-align: center;
            max-width: 600px;
            padding: 30px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-lg {
            margin: 15px;
            padding: 20px 40px;
            font-size: 1.5rem;
            width: 80%;
            max-width: 400px;
        }
        .icon {
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome</h1>
        <h3 class="text-muted mb-4">Please choose your verification method</h3>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <div class="d-flex flex-column align-items-center mt-4">
            <a href="{{ url_for('face_recognition_page') }}" class="btn btn-primary btn-lg">
                <i class="fas fa-user-circle icon"></i> Face Recognition
            </a>
            <a href="{{ url_for('phone_entry') }}" class="btn btn-secondary btn-lg">
                <i class="fas fa-phone icon"></i> Phone Number
            </a>
        </div>
    </div>

    <script>
        // Force a fresh page load when selecting face recognition to prevent session issues
        document.addEventListener('DOMContentLoaded', function() {
            const faceRecLink = document.querySelector('a[href*="face-recognition"]');
            if (faceRecLink) {
                faceRecLink.addEventListener('click', function(e) {
                    e.preventDefault();
                    // Add a cache-busting parameter to ensure a fresh page load
                    window.location.href = '/face-recognition?nocache=' + new Date().getTime();
                });
            }
        });
    </script>
</body>
</html>
