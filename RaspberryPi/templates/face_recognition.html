{% extends "base.html" %}

{% block content %}
<div class="container pt-4">
    <div class="row">
        <div class="col-12">
            <h1 class="mb-4">Face Recognition</h1>
            
            {% if message %}
            <div class="alert alert-{{ 'success' if status == 'success' else 'danger' }} mb-4">
                {{ message }}
            </div>
            {% endif %}
            
            <div class="card mb-4">
                <div class="card-body">
                    <h5 class="card-title">Camera Feed</h5>
                    <div class="camera-feed">
                        <img src="{{ url_for('face_recognition_feed') }}" class="img-fluid" alt="Live Camera Feed">
                    </div>
                </div>
            </div>
            
            <div class="row mb-4">
                <div class="col-md-6">
                    <form method="POST" action="{{ url_for('face_recognition') }}">
                        <button type="submit" class="btn btn-primary btn-lg" id="startFaceRecBtn">
                            Start Face Recognition
                        </button>
                    </form>
                </div>
            </div>
            
            {% if show_debug_image %}
            <div class="card mb-4">
                <div class="card-body">
                    <h5 class="card-title">Debug Image</h5>
                    <div class="debug-image">
                        <img src="{{ url_for('static', filename='uploads/debug_frame.jpg') }}?time={{ time() }}" class="img-fluid" alt="Debug Frame">
                    </div>
                </div>
            </div>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Refresh the page when the camera feed stops
    document.addEventListener('DOMContentLoaded', function() {
        const cameraImg = document.querySelector('.camera-feed img');
        
        // If the image fails to load, refresh the page after a short delay
        cameraImg.addEventListener('error', function() {
            setTimeout(function() {
                location.reload();
            }, 2000);
        });
    });
</script>
{% endblock %}
