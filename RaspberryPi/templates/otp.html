<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OTP Verification</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
  <div class="container mt-5">
    <h1 class="text-center">OTP Verification</h1>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="mt-4">
          {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    <form method="POST" action="{{ url_for('verify') }}">
      <div class="form-group">
        <label for="otp_code">Enter OTP Code</label>
        <input type="text" name="otp_code" id="otp_code" class="form-control" placeholder="Enter OTP" required>
      </div>
      <!-- Pass the phone number as hidden data -->
      <input type="hidden" name="phone_number" value="{{ phone_number }}">
      <button type="submit" class="btn btn-success btn-block">Verify OTP</button>
    </form>
  </div>
</body>
</html>
